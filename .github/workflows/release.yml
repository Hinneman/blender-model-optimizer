name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              for line in f:
                  m = re.match(r'^version\s*=\s*\"([^\"]+)\"', line)
                  if m:
                      print(m.group(1))
                      break
          ")
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml ($TOML_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION"

      - name: Lint
        run: |
          pip install ruff
          ruff check src/

      - name: Build
        run: python build.py

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version (between its ## header and the next ## header)
          BODY=$(python -c "
          import re, sys
          text = open('CHANGELOG.md').read()
          pattern = r'## \[' + re.escape('$TAG_VERSION') + r'\].*?\n(.*?)(?=\n## |\Z)'
          m = re.search(pattern, text, re.DOTALL)
          if m:
              print(m.group(1).strip())
          else:
              print('No changelog entry found for version $TAG_VERSION')
              sys.exit(1)
          ")
          # Write to file to preserve newlines
          echo "$BODY" > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_body.md
          files: build/model-optimizer-addon.py
